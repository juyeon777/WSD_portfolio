/* ---- Project list: each project = its own card, laid out in a grid ---- */
.container:has(> a.mb-5) {
  max-width: 1100px !important;
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
  background: transparent !important;
  border: 0 !important;
  box-shadow: none !important;
  border-radius: 0 !important;
  overflow: visible !important;
  padding: .5rem 1rem 1rem;
}
.container:has(> a.mb-5) > a {
  display: block;
  margin: 0 !important;
  height: 100%;
  background: #ffffff;
  border: 1px solid #ececec;
  border-top: 3px solid #2f4f4f;
  border-radius: 16px;
  box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
  overflow: hidden;
  transition: transform .22s ease, box-shadow .22s ease;
}
.container:has(> a.mb-5) > a:hover {
  transform: translateY(-5px);
  box-shadow: 0 14px 30px rgba(47, 79, 79, .18);
}
html.dark .container:has(> a.mb-5) > a {
  background: rgb(38, 63, 63);
  border-color: rgba(110, 163, 163, .22);
  border-top-color: #6ea3a3;
}
.container:has(> a.mb-5) > a > div { display: block !important; height: 100%; }
/* featured thumbnail → full width on top of the card */
.container:has(> a.mb-5) > a img {
  width: 100% !important;
  max-width: none !important;
  height: 11rem !important;
  object-fit: cover !important;
}
.container:has(> a.mb-5) .p-8 { display: flex; flex-direction: column; height: 100%; padding: 1.4rem 1.5rem; }
.container:has(> a.mb-5) .uppercase {
  color: #2f4f4f !important;
  letter-spacing: .02em;
  font-size: 1.02rem;
  margin-bottom: .55rem;
}
html.dark .container:has(> a.mb-5) .uppercase { color: #a7cccc !important; }
.container:has(> a.mb-5) p.block {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  font-weight: 400 !important;
  font-size: .9rem;
  line-height: 1.55;
  color: #5b5b5b !important;
  margin-top: 0;
}
html.dark .container:has(> a.mb-5) p.block { color: #cdd9d9 !important; }
.container:has(> a.mb-5) p.mt-2 { margin-top: auto !important; padding-top: .9rem; }

.prose p:has(> a[href*="kci.go.kr"]),

/* ---- Project-detail section headings (teal accent) ---- */

/* ---- Home first impression: social icon hover + résumé button + avatar ---- */

}

#profile a[href*="resume.pdf"] { transition: transform .15s ease, box-shadow .15s ease; }
#profile a[href*="resume.pdf"]:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(150, 110, 0, .22);
}
#profile .avatar { box-shadow: 0 10px 26px rgba(150, 110, 0, .18); }

/* ---- Sitewide warm tone: cream background on the fixed bg layer ---- */
#page-bg { background-color: #fbf8ef; }
html.dark #page-bg { background-color: rgb(28, 24, 16); }

/* ---- Hide the theme 'Published with Hugo Blox Builder' credit ---- */
.powered-by { display: none !important; }

/* ---- Nav: teal hover + current-page (active) indicator ---- */
.nav-link { position: relative; }
.nav-link:hover { color: #bf8f00 !important; }
.nav-link.is-current,
.nav-link.active,
.nav-dropdown-link.is-current { color: #bf8f00 !important; font-weight: 700; }
html.dark .nav-link:hover,
html.dark .nav-link.is-current,
html.dark .nav-link.active,
html.dark .nav-dropdown-link.is-current { color: #ecd07a !important; }
.nav-link::after {
  content: "";
  position: absolute;
  left: .75rem; right: .75rem; bottom: .35rem;
  height: 2px; border-radius: 2px;
  background: #bf8f00;
  transform: scaleX(0);
  transition: transform .2s ease;
}
.nav-link:hover::after,
.nav-link.is-current::after,
.nav-link.active::after { transform: scaleX(1); }
html.dark .nav-link::after { background: #ecd07a; }

/* ---- "성격 및 업무 스타일" section (trendy) ---- */
/* section divider (under-bar) between the biography hero and this section */
#work-style::before, #featured-projects::before { content: ""; display: block; width: 64px; height: 4px; border-radius: 3px; background: #bf8f00; margin: 0 auto 2.6rem; }
html.dark #work-style::before, html.dark #featured-projects::before { background: #e0bd5a; }
.ws-quote, .ws-lead, .ws-label, .ws-chips, .ws-growth { max-width: 740px; margin-left: auto; margin-right: auto; }
.ws-quote {
  text-align: center;
  padding: 2rem 1.6rem 1.7rem;
  margin: .5rem auto 2rem;
  border-radius: 20px;
  background: linear-gradient(135deg, #fdf8e9 0%, #fbf3dd 100%);
  border: none;
  position: relative; overflow: hidden;
}
html.dark .ws-quote { background: linear-gradient(135deg, rgba(74,60,26,.5) 0%, rgba(58,47,22,.5) 100%); border-color: rgba(200,165,80,.18); }
.ws-quote::before {
  content: "\201C"; position: absolute; top: .1rem; left: 1.1rem;
  font-family: Georgia, 'Times New Roman', serif; font-size: 4.5rem; line-height: 1;
  color: #bf8f00; opacity: .1;
}
.ws-quote-main { font-size: 1.5rem; font-weight: 800; line-height: 1.45; letter-spacing: -.01em; color: #bf8f00; margin: 0 0 .55rem; }
html.dark .ws-quote-main { color: #efe3c4; }
.ws-quote-sub { font-size: .95rem; font-style: italic; color: #74857d; margin: 0; }
html.dark .ws-quote-sub { color: #bfb188; }
.ws-lead { font-size: 1.02rem; line-height: 1.9; color: #4d5a54; text-align: center; margin: 0 auto 2.4rem; }
html.dark .ws-lead { color: #cfc4a6; }
.ws-label { display: flex; align-items: center; gap: .55rem; font-size: 1.1rem; font-weight: 800; color: #bf8f00; margin: 0 auto 1.1rem; }
html.dark .ws-label { color: #ecd07a; }
.ws-label::before { content: ""; width: 5px; height: 1.05em; border-radius: 3px; background: #bf8f00; }
html.dark .ws-label::before { background: #e0bd5a; }
.ws-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: .55rem; margin-bottom: 2.4rem; }
.ws-chip {
  background: #fbf3d8; color: #8c6a00; border: 1px solid #f0e2b6;
  border-radius: 9999px; padding: .52rem 1.05rem;
  font-size: .88rem; font-weight: 600; line-height: 1.4;
  transition: transform .15s ease, box-shadow .15s ease;
}
.ws-chip:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(150, 110, 0, .14); }
html.dark .ws-chip { background: rgba(191, 143, 0, .14); color: #e6c970; border-color: rgba(200, 165, 80, .22); }

/* ---- 대표 프로젝트 (featured projects on home) ---- */
.fp-carousel-wrap { position: relative; max-width: 720px; margin: 0 auto; border-radius: 18px; overflow: hidden; box-shadow: 0 6px 22px rgba(0, 0, 0, .15); }
.fp-carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none; }
.fp-carousel::-webkit-scrollbar { display: none; }
.fp-card { position: relative; flex: 0 0 100%; scroll-snap-align: center; display: block; height: 300px; text-decoration: none; }
.fp-card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .6s ease; }
.fp-card:hover img { transform: scale(1.05); }
.fp-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.4rem 1.6rem 1.6rem; background: linear-gradient(to top, rgba(18, 14, 3, .92) 0%, rgba(18, 14, 3, .5) 45%, rgba(18, 14, 3, 0) 78%); }
.fp-tag { position: absolute; top: 1rem; left: 1rem; background: rgba(191, 143, 0, .95); color: #fff; font-size: .72rem; font-weight: 700; letter-spacing: .02em; padding: .3rem .7rem; border-radius: 9999px; box-shadow: 0 2px 6px rgba(0, 0, 0, .25); }
.fp-title { color: #fff; font-weight: 800; font-size: 1.25rem; margin: 0 0 .4rem; line-height: 1.3; text-shadow: 0 1px 5px rgba(0, 0, 0, .5); }
.fp-desc { color: rgba(255, 255, 255, .9); font-size: .9rem; line-height: 1.5; margin: 0; text-shadow: 0 1px 4px rgba(0, 0, 0, .5); max-width: 92%; }
.fp-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 2.6rem; height: 2.6rem; border: none; border-radius: 50%; background: rgba(0, 0, 0, .42); color: #fff; font-size: 1.5rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s ease; z-index: 2; }
.fp-nav:hover { background: rgba(191, 143, 0, .92); }
.fp-prev { left: .6rem; }
.fp-next { right: .6rem; }
.fp-dots { display: flex; justify-content: center; gap: .5rem; margin-top: 1rem; }
.fp-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddcfa4; cursor: pointer; transition: all .25s ease; padding: 0; border: none; }
.fp-dot.active { background: #bf8f00; width: 22px; border-radius: 9999px; }
html.dark .fp-dot { background: #5a4d28; }
html.dark .fp-dot.active { background: #e0bd5a; }
.fp-more { text-align: center; margin-top: 1.4rem; }
.fp-more a { color: #bf8f00; font-weight: 600; font-size: .92rem; text-decoration: none; }
.fp-more a:hover { text-decoration: underline; }
html.dark .fp-more a { color: #e0bd5a; }
.ws-growth { list-style: none; padding: 0; display: flex; flex-direction: column; gap: .65rem; }
.ws-growth li { position: relative; padding-left: 1.5rem; font-size: .92rem; line-height: 1.65; color: #5c6862; }
.ws-growth li::before { content: "\2192"; position: absolute; left: 0; top: 0; color: #bf8f00; font-weight: 800; }
html.dark .ws-growth li { color: #c3b896; }
html.dark .ws-growth li::before { color: #e0bd5a; }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var path = location.pathname.replace(/\/+$/, '');
    var best = null, bestLen = -1;
    document.querySelectorAll('a.nav-link, a.nav-dropdown-link').forEach(function (a) {
      var hp = (a.getAttribute('href') || '').replace(/\/+$/, '');
      if (!hp) return;
      if (path === hp || path.indexOf(hp + '/') === 0) {
        if (hp.length > bestLen) { bestLen = hp.length; best = a; }
      }
    });
    if (best) best.classList.add('is-current');

    // 대표 프로젝트 carousel (arrows + dots)
    document.querySelectorAll('.fp-carousel-wrap').forEach(function (wrap) {
      var car = wrap.querySelector('.fp-carousel');
      if (!car) return;
      var prev = wrap.querySelector('.fp-prev');
      var next = wrap.querySelector('.fp-next');
      if (prev) prev.addEventListener('click', function (e) { e.preventDefault(); car.scrollBy({ left: -car.clientWidth, behavior: 'smooth' }); });
      if (next) next.addEventListener('click', function (e) { e.preventDefault(); car.scrollBy({ left: car.clientWidth, behavior: 'smooth' }); });
      var dotsBox = wrap.nextElementSibling;
      var dots = (dotsBox && dotsBox.classList.contains('fp-dots')) ? dotsBox.querySelectorAll('.fp-dot') : [];
      if (dots.length) {
        car.addEventListener('scroll', function () {
          var idx = Math.round(car.scrollLeft / car.clientWidth);
          dots.forEach(function (d, i) { d.classList.toggle('active', i === idx); });
        });
        dots.forEach(function (d, i) { d.addEventListener('click', function () { car.scrollTo({ left: i * car.clientWidth, behavior: 'smooth' }); }); });
      }
    });
  });
</script>
